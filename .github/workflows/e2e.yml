name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so the gate stays fast.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: internship_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    env:
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/internship_test"
      NEXTAUTH_SECRET: "ci-test-secret-not-for-production"
      NEXTAUTH_URL: "http://localhost:3000"
      # Seeded admin used by the smoke tests
      SEED_ADMIN_EMAIL: "admin@example.com"
      SEED_ADMIN_PASSWORD: "ChangeMe123!"
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "ChangeMe123!"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply DB schema
        run: npx prisma db push

      - name: Seed admin user
        run: npx prisma db seed

      - name: Build app
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
