name: Deploy to Plesk Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    name: ${{ github.event_name == 'pull_request' && 'Preview Deploy' || 'Production Deploy' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # push images to ghcr.io
      pull-requests: write  # post/update preview comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          # Docker image names must be lower-case
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=ghcr.io/${REPO}:pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
            echo "container=internship-crm-preview" >> $GITHUB_OUTPUT
            echo "port=3001" >> $GITHUB_OUTPUT
            echo "nextauth_url=${{ secrets.PREVIEW_URL }}" >> $GITHUB_OUTPUT
          else
            echo "tag=ghcr.io/${REPO}:latest" >> $GITHUB_OUTPUT
            echo "container=internship-crm" >> $GITHUB_OUTPUT
            echo "port=3000" >> $GITHUB_OUTPUT
            echo "nextauth_url=${{ secrets.NEXTAUTH_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tag }}
          # No build-time secrets — all real values are injected at `docker run`

      # ── Production deploy (push to main) ────────────────────────────────────
      - name: Deploy to production via SSH
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            IMAGE="${{ steps.meta.outputs.tag }}"

            # Pull the freshly built image from GHCR
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$IMAGE"

            # Apply schema changes before starting the new container.
            # --network=host lets the container reach MySQL on localhost (same host).
            docker run --rm \
              --network=host \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              "$IMAGE" \
              npx prisma db push --accept-data-loss

            # Swap containers (zero-downtime swap)
            docker stop internship-crm 2>/dev/null || true
            docker rm   internship-crm 2>/dev/null || true
            docker run -d \
              --name internship-crm \
              --network=host \
              --restart=unless-stopped \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}" \
              -e PORT=3000 \
              "$IMAGE"

            # Remove dangling images to free disk space
            docker image prune -f

      # ── Preview deploy (pull_request) ───────────────────────────────────────
      - name: Deploy preview via SSH
        if: github.event_name == 'pull_request'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            IMAGE="${{ steps.meta.outputs.tag }}"

            # Pull the freshly built image from GHCR
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "$IMAGE"

            # Apply schema changes.
            # --network=host lets the container reach MySQL on localhost (same host).
            docker run --rm \
              --network=host \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              "$IMAGE" \
              npx prisma db push --accept-data-loss

            # Swap preview containers
            docker stop internship-crm-preview 2>/dev/null || true
            docker rm   internship-crm-preview 2>/dev/null || true
            docker run -d \
              --name internship-crm-preview \
              --network=host \
              --restart=unless-stopped \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}" \
              -e NEXTAUTH_URL="${{ secrets.PREVIEW_URL }}" \
              -e PORT=3001 \
              "$IMAGE"

            # Remove dangling images to free disk space
            docker image prune -f

      - name: Post preview URL comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ secrets.PREVIEW_URL }}';
            const body = `### 🔍 Preview deployment ready\n\n` +
              `Branch **\`${{ github.head_ref }}\`** has been deployed to the preview server.\n\n` +
              `**URL:** ${previewUrl}\n\n` +
              `> This preview is updated automatically on every push to this PR.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Preview deployment ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

