name: Deploy to Plesk Server

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    name: ${{ github.event_name == 'pull_request' && 'Preview Deploy' || 'Production Deploy' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ github.event_name == 'pull_request' && secrets.PREVIEW_URL || secrets.NEXTAUTH_URL }}

      # ── Production deploy (push to main) ────────────────────────────────────
      - name: Deploy to production via SSH
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}"
            export NEXTAUTH_URL="${{ secrets.NEXTAUTH_URL }}"
            # Disable git ownership check (SSH user differs from Plesk's directory owner)
            git config --global --add safe.directory '*'

            # Initialise git in the directory if needed
            mkdir -p ${{ secrets.APP_PATH }}
            [ -d "${{ secrets.APP_PATH }}/.git" ] || git -C ${{ secrets.APP_PATH }} init

            # Use PAT-authenticated HTTPS URL for private repo access (idempotent)
            git -C ${{ secrets.APP_PATH }} remote set-url origin https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }} 2>/dev/null || \
              git -C ${{ secrets.APP_PATH }} remote add origin https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}

            cd ${{ secrets.APP_PATH }}

            git fetch origin
            git reset --hard origin/main
            git clean -fd

            npm ci

            npx prisma generate
            npx prisma db push --accept-data-loss

            npm run build

            if command -v pm2 &> /dev/null; then
              pm2 restart internship-crm --update-env || pm2 start npm --name internship-crm -- start
            fi

      # ── Preview deploy (pull_request) ───────────────────────────────────────
      - name: Deploy preview via SSH
        if: github.event_name == 'pull_request'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}"
            export NEXTAUTH_URL="${{ secrets.PREVIEW_URL }}"
            export PORT=3001
            # Disable git ownership check (SSH user differs from Plesk's directory owner)
            git config --global --add safe.directory '*'

            # Initialise git in the directory if needed
            mkdir -p ${{ secrets.PREVIEW_APP_PATH }}
            [ -d "${{ secrets.PREVIEW_APP_PATH }}/.git" ] || git -C ${{ secrets.PREVIEW_APP_PATH }} init

            # Use PAT-authenticated HTTPS URL for private repo access (idempotent)
            git -C ${{ secrets.PREVIEW_APP_PATH }} remote set-url origin https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }} 2>/dev/null || \
              git -C ${{ secrets.PREVIEW_APP_PATH }} remote add origin https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}

            cd ${{ secrets.PREVIEW_APP_PATH }}

            # Check out the PR branch
            git fetch origin ${{ github.head_ref }}
            git checkout -B ${{ github.head_ref }} origin/${{ github.head_ref }}
            git reset --hard origin/${{ github.head_ref }}
            git clean -fd

            npm ci

            npx prisma generate
            npx prisma db push --accept-data-loss

            npm run build

            if command -v pm2 &> /dev/null; then
              pm2 restart internship-crm-preview --update-env || \
              PORT=3001 pm2 start npm --name internship-crm-preview -- start
            fi

      - name: Post preview URL comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ secrets.PREVIEW_URL }}';
            const body = `### 🔍 Preview deployment ready\n\n` +
              `Branch **\`${{ github.head_ref }}\`** has been deployed to the preview server.\n\n` +
              `**URL:** ${previewUrl}\n\n` +
              `> This preview is updated automatically on every push to this PR.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Preview deployment ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

