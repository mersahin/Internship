name: Deploy to Plesk Server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    name: ${{ github.event_name == 'pull_request' && 'Preview Deploy' || 'Production Deploy' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # push images to ghcr.io
      pull-requests: write  # post/update preview comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          # Docker image names must be lower-case
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=ghcr.io/${REPO}:pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=ghcr.io/${REPO}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tag }}
          # No build-time secrets — all real values are injected at `docker run`

      # ── SSH key setup (shared by both deploy steps) ──────────────────────────
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write via env var (not inline interpolation) to preserve exact OpenSSH format.
          # tr -d '\r' removes Windows-style carriage returns that corrupt the key.
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Trust the server's host key
          ssh-keyscan -H -p "${SSH_PORT:-22}" "$SSH_HOST" \
            >> ~/.ssh/known_hosts 2>/dev/null || \
          ssh-keyscan -H "$SSH_HOST" \
            >> ~/.ssh/known_hosts 2>/dev/null || true

      # ── Production deploy (push to main) ────────────────────────────────────
      - name: Deploy to production via SSH
        if: github.event_name == 'push'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          IMAGE: ${{ steps.meta.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ACTOR: ${{ github.actor }}
        run: |
          # Base64-encode secrets so special characters survive the SSH transport
          B64_TOKEN=$(printf '%s' "$GH_TOKEN"        | base64 -w0)
          B64_DB=$(printf '%s'  "$DATABASE_URL"    | base64 -w0)
          B64_SEC=$(printf '%s' "$NEXTAUTH_SECRET" | base64 -w0)
          B64_URL=$(printf '%s' "$NEXTAUTH_URL"    | base64 -w0)
          B64_SMTP_HOST=$(printf '%s' "$SMTP_HOST" | base64 -w0)
          B64_SMTP_PORT=$(printf '%s' "$SMTP_PORT" | base64 -w0)
          B64_SMTP_USER=$(printf '%s' "$SMTP_USER" | base64 -w0)
          B64_SMTP_PASS=$(printf '%s' "$SMTP_PASS" | base64 -w0)
          B64_SMTP_FROM=$(printf '%s' "$SMTP_FROM" | base64 -w0)

          ssh -i ~/.ssh/deploy_key \
            -p "${SSH_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            "${SSH_USER}@${SSH_HOST}" "bash -s" << EOF
          set -e
          GH_TOKEN=\$(printf '%s' '$B64_TOKEN' | base64 -d)
          DATABASE_URL=\$(printf '%s' '$B64_DB'  | base64 -d)
          NEXTAUTH_SECRET=\$(printf '%s' '$B64_SEC' | base64 -d)
          NEXTAUTH_URL=\$(printf '%s' '$B64_URL' | base64 -d)
          SMTP_HOST=\$(printf '%s' '$B64_SMTP_HOST' | base64 -d)
          SMTP_PORT=\$(printf '%s' '$B64_SMTP_PORT' | base64 -d)
          SMTP_USER=\$(printf '%s' '$B64_SMTP_USER' | base64 -d)
          SMTP_PASS=\$(printf '%s' '$B64_SMTP_PASS' | base64 -d)
          SMTP_FROM=\$(printf '%s' '$B64_SMTP_FROM' | base64 -d)
          IMAGE='$IMAGE'
          ACTOR='$ACTOR'

          echo "\$GH_TOKEN" | docker login ghcr.io -u "\$ACTOR" --password-stdin
          docker pull "\$IMAGE"

          # Apply schema changes via host networking so 127.0.0.1 MySQL is reachable.
          docker run --rm \
            --network=host \
            -e DATABASE_URL="\$DATABASE_URL" \
            "\$IMAGE" \
            npx prisma db push --accept-data-loss

          # Seed starter document templates (idempotent — only adds missing ones).
          docker run --rm \
            --network=host \
            -e DATABASE_URL="\$DATABASE_URL" \
            "\$IMAGE" \
            node prisma/seed-templates.mjs || true

          docker stop internship-crm 2>/dev/null || true
          docker rm   internship-crm 2>/dev/null || true
          # Run with host networking so the app reaches the host's MySQL over
          # 127.0.0.1 — the same path the db push above uses. Bridge networking via
          # host.docker.internal failed because the crm DB user is not granted from
          # the Docker gateway IP, leaving the app unable to log in. See issue #45.
          docker run -d \
            --name internship-crm \
            --network=host \
            --restart=unless-stopped \
            -e PORT=3200 \
            -e DATABASE_URL="\$DATABASE_URL" \
            -e NEXTAUTH_SECRET="\$NEXTAUTH_SECRET" \
            -e NEXTAUTH_URL="\$NEXTAUTH_URL" \
            -e NEXT_PUBLIC_APP_URL="\$NEXTAUTH_URL" \
            -e SMTP_HOST="\$SMTP_HOST" \
            -e SMTP_PORT="\$SMTP_PORT" \
            -e SMTP_USER="\$SMTP_USER" \
            -e SMTP_PASS="\$SMTP_PASS" \
            -e SMTP_FROM="\$SMTP_FROM" \
            "\$IMAGE"

          docker image prune -af
          docker builder prune -af --filter until=72h
          EOF

      # ── Preview deploy (pull_request) ───────────────────────────────────────
      - name: Deploy preview via SSH
        if: github.event_name == 'pull_request'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          IMAGE: ${{ steps.meta.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PREVIEW }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          PREVIEW_URL: ${{ secrets.PREVIEW_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ACTOR: ${{ github.actor }}
        run: |
          B64_TOKEN=$(printf '%s' "$GH_TOKEN"        | base64 -w0)
          B64_DB=$(printf '%s'  "$DATABASE_URL"    | base64 -w0)
          B64_SEC=$(printf '%s' "$NEXTAUTH_SECRET" | base64 -w0)
          B64_URL=$(printf '%s' "$PREVIEW_URL"     | base64 -w0)
          B64_SMTP_HOST=$(printf '%s' "$SMTP_HOST" | base64 -w0)
          B64_SMTP_PORT=$(printf '%s' "$SMTP_PORT" | base64 -w0)
          B64_SMTP_USER=$(printf '%s' "$SMTP_USER" | base64 -w0)
          B64_SMTP_PASS=$(printf '%s' "$SMTP_PASS" | base64 -w0)
          B64_SMTP_FROM=$(printf '%s' "$SMTP_FROM" | base64 -w0)

          ssh -i ~/.ssh/deploy_key \
            -p "${SSH_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            "${SSH_USER}@${SSH_HOST}" "bash -s" << EOF
          set -e
          GH_TOKEN=\$(printf '%s' '$B64_TOKEN' | base64 -d)
          DATABASE_URL=\$(printf '%s' '$B64_DB'  | base64 -d)
          NEXTAUTH_SECRET=\$(printf '%s' '$B64_SEC' | base64 -d)
          PREVIEW_URL=\$(printf '%s' '$B64_URL' | base64 -d)
          SMTP_HOST=\$(printf '%s' '$B64_SMTP_HOST' | base64 -d)
          SMTP_PORT=\$(printf '%s' '$B64_SMTP_PORT' | base64 -d)
          SMTP_USER=\$(printf '%s' '$B64_SMTP_USER' | base64 -d)
          SMTP_PASS=\$(printf '%s' '$B64_SMTP_PASS' | base64 -d)
          SMTP_FROM=\$(printf '%s' '$B64_SMTP_FROM' | base64 -d)
          IMAGE='$IMAGE'
          ACTOR='$ACTOR'

          echo "\$GH_TOKEN" | docker login ghcr.io -u "\$ACTOR" --password-stdin
          docker pull "\$IMAGE"

          # Replace localhost/127.0.0.1 with host.docker.internal so the container
          # can reach MySQL running on the host (works on Linux with --add-host).
          CONTAINER_DB=\$(echo "\$DATABASE_URL" | sed 's|localhost|host.docker.internal|g; s|127\.0\.0\.1|host.docker.internal|g')

          # Apply schema changes. The preview DB user (crm-preview) is only granted
          # from the docker gateway, not localhost, so push via host.docker.internal
          # (the same connection the app container uses) rather than --network=host.
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -e DATABASE_URL="\$CONTAINER_DB" \
            "\$IMAGE" \
            npx prisma db push --accept-data-loss

          # Seed starter document templates (idempotent).
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -e DATABASE_URL="\$CONTAINER_DB" \
            "\$IMAGE" \
            node prisma/seed-templates.mjs || true

          docker stop internship-crm-preview 2>/dev/null || true
          docker rm   internship-crm-preview 2>/dev/null || true
          docker run -d \
            --name internship-crm-preview \
            -p 3201:3000 \
            --add-host=host.docker.internal:host-gateway \
            --restart=unless-stopped \
            -e DATABASE_URL="\$CONTAINER_DB" \
            -e NEXTAUTH_SECRET="\$NEXTAUTH_SECRET" \
            -e NEXTAUTH_URL="\$PREVIEW_URL" \
            -e NEXT_PUBLIC_APP_URL="\$PREVIEW_URL" \
            -e SMTP_HOST="\$SMTP_HOST" \
            -e SMTP_PORT="\$SMTP_PORT" \
            -e SMTP_USER="\$SMTP_USER" \
            -e SMTP_PASS="\$SMTP_PASS" \
            -e SMTP_FROM="\$SMTP_FROM" \
            "\$IMAGE"

          docker image prune -af
          docker builder prune -af --filter until=72h
          EOF

      - name: Post preview URL comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ secrets.PREVIEW_URL }}';
            const body = `### 🔍 Preview deployment ready\n\n` +
              `Branch **\`${{ github.head_ref }}\`** has been deployed to the preview server.\n\n` +
              `**URL:** ${previewUrl}\n\n` +
              `> This preview is updated automatically on every push to this PR.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Preview deployment ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

